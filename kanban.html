<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root { color-scheme: light }
  * { margin: 0; padding: 0; box-sizing: border-box }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #026aa7, #3b5998);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .add-task-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .add-task-btn:hover { background: rgba(255,255,255,0.35); }

  .board {
    display: flex;
    gap: 16px;
    padding: 20px 24px;
    overflow-x: auto;
    min-height: calc(100vh - 70px);
  }

  .column {
    background: #ebecf0;
    border-radius: 8px;
    min-width: 300px;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 120px);
    flex-shrink: 0;
  }

  .column-header {
    padding: 14px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .column-title {
    font-size: 14px;
    font-weight: 600;
    color: #172b4d;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .task-count {
    background: #dfe1e6;
    color: #5e6c84;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .column-body {
    padding: 8px 8px 8px;
    flex: 1;
    overflow-y: auto;
    min-height: 40px;
  }
  .column-body.drag-over {
    background: #d4d8e0;
    border-radius: 0 0 8px 8px;
  }

  .card {
    background: white;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    cursor: grab;
    font-size: 13px;
    color: #44556f;
    line-height: 1.4;
    transition: box-shadow 0.15s, transform 0.15s;
    position: relative;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .card.dragging { opacity: 0.4; transform: rotate(3deg); }

  .card-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 500;
  }
  .tag-job_search { background: #e8d5f5; color: #6b21a8; }
  .tag-website { background: #dbeafe; color: #1e40af; }
  .tag-outreach { background: #d1fae5; color: #065f46; }
  .tag-interview { background: #fee2e2; color: #991b1b; }
  .tag-cv_portfolio_linkedin { background: #fef3c7; color: #92400e; }
  .tag-build { background: #ede9fe; color: #5b21b6; }

  .card-delete {
    position: absolute;
    top: 6px; right: 6px;
    background: none; border: none;
    cursor: pointer;
    color: #aaa; font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: #e11d48; }

  .add-task-card {
    background: none; border: 2px dashed #c4cdd5;
    border-radius: 6px; padding: 8px;
    margin-top: 8px; cursor: pointer;
    color: #5e6c84; font-size: 13px;
    text-align: center; transition: all 0.15s;
  }
  .add-task-card:hover { border-color: #026aa7; color: #026aa7; background: rgba(2,106,167,0.05); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 8px;
    padding: 24px; width: 400px; max-width: 90vw;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; color: #172b4d; }
  .modal label { display: block; font-size: 12px; font-weight: 600; color: #5e6c84; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 8px 10px; border: 1px solid #dfe1e6;
    border-radius: 4px; font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #026aa7; }
  .modal textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 16px; border: none; background: #f4f5f7; color: #5e6c84;
    border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .btn-primary {
    padding: 8px 16px; border: none; background: #026aa7; color: white;
    border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .btn-primary:hover { background: #0258b0; }
  .tag-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag-option {
    font-size: 11px; padding: 3px 10px; border-radius: 3px;
    cursor: pointer; border: 2px solid transparent; transition: all 0.15s;
  }
  .tag-option:hover { opacity: 0.8; }
  .tag-option.selected { border-color: #172b4d; box-shadow: 0 0 0 1px #172b4d; }

  .empty-state {
    color: #9ba3af; font-size: 12px; text-align: center; padding: 20px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Kanban Board</h1>
  <button class="add-task-btn" onclick="openModal()">+ New Task</button>
</div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">New Task</h2>
    <label>Title</label>
    <input type="text" id="taskTitle" placeholder="Enter task title...">
    <label>Description</label>
    <textarea id="taskDesc" placeholder="Optional description..."></textarea>
    <label>Column</label>
    <select id="taskColumn">
      <option value="backlog">Backlog</option>
      <option value="todo">To Do</option>
      <option value="inprogress">In Progress</option>
      <option value="review">In Review</option>
      <option value="done">Done</option>
    </select>
    <label>Tags</label>
    <div class="tag-selector" id="tagSelector"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
const COLUMNS = [
  { id: 'backlog', title: 'Backlog', color: '#9ba3af' },
  { id: 'todo', title: 'To Do', color: '#4c9ced' },
  { id: 'inprogress', title: 'In Progress', color: '#f59e0b' },
  { id: 'review', title: 'In Review', color: '#a78bfa' },
  { id: 'done', title: 'Done', color: '#34d399' }
];

const TAGS = [
  { name: 'job_search', class: 'tag-job_search' },
  { name: 'website', class: 'tag-website' },
  { name: 'outreach', class: 'tag-outreach' },
  { name: 'interview', class: 'tag-interview' },
  { name: 'cv_portfolio_linkedin', class: 'tag-cv_portfolio_linkedin' },
  { name: 'build', class: 'tag-build' }
];

let tasks = [];
let editingId = null;
let draggedCard = null;

const DEFAULT_TASKS = [
  { id: 1, title: 'Research competitor landing pages', desc: 'Audit top 5 competitor homepages and extract key messaging patterns.', column: 'backlog', tags: ['outreach'] },
  { id: 2, title: 'Design system token refresh', desc: 'Update color and spacing tokens for v3 design system.', column: 'backlog', tags: ['website'] },
  { id: 3, title: 'Onboarding flow redesign', desc: 'Redesign the first-time user experience to improve activation rate.', column: 'todo', tags: ['website'] },
  { id: 4, title: 'Fix dark mode contrast', desc: 'WCAG AA violations on dashboard cards.', column: 'todo', tags: ['website'] },
  { id: 5, title: 'API rate limiting middleware', desc: 'Add token bucket limiter to all public endpoints.', column: 'inprogress', tags: ['job_search'] },
  { id: 6, title: 'Auth service migration', desc: 'Move from JWT sessions to OIDC with Keycloak.', column: 'inprogress', tags: ['job_search'] },
  { id: 7, title: 'Dashboard performance audit', desc: 'Profile slow queries and optimize the main dashboard render path.', column: 'inprogress', tags: ['job_search'] },
  { id: 8, title: 'User profile page updates', desc: 'New avatar upload + bio section. Awaiting design specs.', column: 'review', tags: ['website'] },
  { id: 9, title: 'Email notification preferences', desc: 'Allow users to toggle individual notification types.', column: 'done', tags: ['outreach'] },
  { id: 10, title: 'Quarterly accessibility audit', desc: 'Full WCAG 2.2 AA scan across all public pages.', column: 'done', tags: ['cv_portfolio_linkedin'] }
];

function init() {
  const saved = localStorage.getItem('kanban-tasks');
  tasks = saved ? JSON.parse(saved) : DEFAULT_TASKS.map(t => ({...t}));
  if (!tasks.find(t => t.title === 'Connect Claude to LinkedIn to search for jobs')) {
    tasks.push({ id: Date.now(), title: 'Connect Claude to LinkedIn to search for jobs', desc: 'Get Claude to connect to LinkedIn and automate job searching.', column: 'todo', tags: ['job_search'] });
    save();
  }

  renderTags();
  renderBoard();
}

function save() {
  localStorage.setItem('kanban-tasks', JSON.stringify(tasks));
}

function renderTags() {
  const el = document.getElementById('tagSelector');
  el.innerHTML = TAGS.map(t =>
    `<span class="tag-option ${t.class}" data-tag="${t.name}" onclick="toggleTag(this)">${t.name.replace(/_/g, ' ')}</span>`
  ).join('');
}

function toggleTag(el) {
  el.classList.toggle('selected');
}

function getSelectedTags() {
  return [...document.querySelectorAll('.tag-option.selected')].map(e => e.dataset.tag);
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = COLUMNS.map(col => {
    const colTasks = tasks.filter(t => t.column === col.id);
    return `
      <div class="column">
        <div class="column-header">
          <span class="column-title">
            <span class="column-dot" style="background:${col.color}"></span>
            ${col.title}
          </span>
          <span class="task-count">${colTasks.length}</span>
        </div>
        <div class="column-body" data-column="${col.id}"
             ondragover="onDragOver(event)" ondrop="onDrop(event, '${col.id}')"
             ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)">
          ${colTasks.length === 0 ? '<div class="empty-state">Drop tasks here</div>' : ''}
          ${colTasks.map(t => renderCard(t)).join('')}
          <button class="add-task-card" onclick="openModal(null, '${col.id}')">+ Add task</button>
        </div>
      </div>
    `;
  }).join('');
}

function renderCard(task) {
  return `
    <div class="card" draggable="true" data-id="${task.id}"
         ondragstart="onDragStart(event, ${task.id})"
         ondragend="onDragEnd(event)"
         onclick="openModal(${task.id})">
      <button class="card-delete" onclick="event.stopPropagation(); deleteTask(${task.id})" title="Delete">&#x2715;</button>
      <div style="font-weight:500;color:#172b4d;margin-bottom:3px">${task.title}</div>
      ${task.desc ? `<div style="color:#6b7a8d;font-size:12px;margin-top:2px">${task.desc.substring(0, 80)}${task.desc.length > 80 ? '...' : ''}</div>` : ''}
      <div class="card-tags">${task.tags.map(tn => { const t = TAGS.find(x=>x.name===tn); return t ? `<span class="tag ${t.class}">${t.name.replace(/_/g, ' ')}</span>` : ''; }).join('')}</div>
    </div>
  `;
}

function openModal(id, column) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Task' : 'New Task';
  document.querySelectorAll('.tag-option').forEach(e => e.classList.remove('selected'));

  if (id) {
    const t = tasks.find(x => x.id === id);
    document.getElementById('taskTitle').value = t.title;
    document.getElementById('taskDesc').value = t.desc || '';
    document.getElementById('taskColumn').value = t.column;
    t.tags.forEach(tn => {
      const el = document.querySelector(`.tag-option[data-tag="${tn}"]`);
      if (el) el.classList.add('selected');
    });
    document.querySelector('.modal-actions .btn-primary').textContent = 'Save Changes';
  } else {
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskColumn').value = column || 'todo';
    document.querySelector('.modal-actions .btn-primary').textContent = 'Add Task';
  }

  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editingId = null;
}

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return;
  const desc = document.getElementById('taskDesc').value.trim();
  const column = document.getElementById('taskColumn').value;
  const tags = getSelectedTags();

  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    t.title = title;
    t.desc = desc;
    t.column = column;
    t.tags = tags;
  } else {
    const newId = tasks.reduce((max, t) => Math.max(max, t.id), 0) + 1;
    tasks.push({ id: newId, title, desc, column, tags });
  }

  save();
  closeModal();
  renderBoard();
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderBoard();
}

function onDragStart(e, id) {
  draggedCard = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.column-body').forEach(el => el.classList.remove('drag-over'));
  draggedCard = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
  e.preventDefault();
  if (e.target.classList.contains('column-body')) {
    e.target.classList.add('drag-over');
  }
}

function onDragLeave(e) {
  if (e.target.classList.contains('column-body') && !e.target.contains(e.relatedTarget)) {
    e.target.classList.remove('drag-over');
  }
}

function onDrop(e, columnId) {
  e.preventDefault();
  e.target.closest('.column-body')?.classList.remove('drag-over');
  if (!draggedCard) return;
  const t = tasks.find(x => x.id === draggedCard);
  if (t) { t.column = columnId; save(); renderBoard(); }
}

init();
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
